# --- Backend: GitHub (for Cloudflare Pages / any non-Netlify host) ---
# Decap needs a small OAuth helper to log in with GitHub. On Cloudflare that's the
# Worker included in this bundle under /cms-oauth-worker. After deploying it, put its
# URL in base_url below and replace OWNER/REPO with your GitHub repo.
backend:
  name: github
  repo: atalantalubna/ahmedlovesbread
  branch: main
  base_url: https://ahmedlovesbread-oauth.lubna.workers.dev
  auth_endpoint: /auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: shows
    label: "Shows"
    files:
      - name: shows
        label: "Tour Shows"
        file: "data/shows.json"
        fields:
          - label: "Shows"
            name: "shows"
            widget: "list"
            summary: "{{fields.date}} - {{fields.name}}"
            fields:
              - { label: "Show name", name: "name", widget: "string" }
              - { label: "Date (YYYY-MM-DD)", name: "date", widget: "string" }
              - { label: "Time", name: "time", widget: "string", required: false }
              - { label: "Venue", name: "venue", widget: "string", required: false }
              - { label: "City", name: "city", widget: "string", required: false }
              - { label: "Address", name: "address", widget: "string", required: false }
              - { label: "Doors", name: "doors", widget: "string", required: false }
              - { label: "Age limit", name: "age", widget: "string", required: false }
              - { label: "Lineup", name: "lineup", widget: "string", required: false }
              - { label: "Ticket link URL", name: "ticket_url", widget: "string", required: false }
              - { label: "Button label", name: "button_label", widget: "string", required: false }
              - { label: "Maps / directions URL", name: "maps_url", widget: "string", required: false }
              - { label: "Flyer image URL", name: "flyer", widget: "string", required: false }
              - { label: "Description", name: "desc", widget: "text", required: false }

  - name: shop
    label: "Shop"
    files:
      - name: products
        label: "Products"
        file: "data/products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} - {{fields.price}}"
            fields:
              - { label: "Product name", name: "name", widget: "string" }
              - { label: "Price (e.g. $28.00)", name: "price", widget: "string" }
              - { label: "Category", name: "category", widget: "string", required: false }
              - { label: "Badge", name: "badge", widget: "string", required: false }
              - { label: "Icon (emoji)", name: "icon", widget: "string", required: false }
              - { label: "Buy link URL", name: "buy_url", widget: "string", required: false }
              - { label: "Description", name: "desc", widget: "text", required: false }
