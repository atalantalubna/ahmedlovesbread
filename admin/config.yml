backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: shows
    label: "Shows"
    files:
      - name: shows
        label: "Tour Shows"
        file: "data/shows.json"
        fields:
          - label: "Shows"
            name: "shows"
            widget: "list"
            summary: "{{fields.date}} — {{fields.name}}"
            fields:
              - { label: "Show name", name: "name", widget: "string" }
              - { label: "Date", name: "date", widget: "string", hint: "Format: YYYY-MM-DD (e.g. 2026-11-14)" }
              - { label: "Time", name: "time", widget: "string", required: false }
              - { label: "Venue", name: "venue", widget: "string", required: false }
              - { label: "City", name: "city", widget: "string", required: false }
              - { label: "Address", name: "address", widget: "string", required: false }
              - { label: "Doors", name: "doors", widget: "string", required: false }
              - { label: "Age limit", name: "age", widget: "string", required: false }
              - { label: "Lineup", name: "lineup", widget: "string", required: false }
              - { label: "Ticket link URL", name: "ticket_url", widget: "string", required: false }
              - { label: "Button label", name: "button_label", widget: "string", required: false, hint: "e.g. Tickets, Free RSVP" }
              - { label: "Maps / directions URL", name: "maps_url", widget: "string", required: false }
              - { label: "Flyer image URL", name: "flyer", widget: "string", required: false }
              - { label: "Description", name: "desc", widget: "text", required: false }

  - name: eats
    label: "Ahmed's Eats"
    files:
      - name: eats
        label: "Restaurant Picks"
        file: "data/eats.json"
        fields:
          - label: "Places"
            name: "eats"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Place name", name: "name", widget: "string" }
              - { label: "Cuisine", name: "cuisine", widget: "string", required: false, hint: "Bakery, Middle Eastern, Coffee, Late-night, Comfort" }
              - { label: "Neighborhood", name: "hood", widget: "string", required: false }
              - { label: "Bread rating (1-5)", name: "rating", widget: "number", default: 5, value_type: "int", min: 1, max: 5, required: false }
              - { label: "Icon (emoji)", name: "icon", widget: "string", required: false }
              - { label: "Blurb / review", name: "blurb", widget: "text", required: false }

  - name: shop
    label: "Shop"
    files:
      - name: products
        label: "Products"
        file: "data/products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - { label: "Product name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. $28.00" }
              - { label: "Category", name: "category", widget: "string", required: false, hint: "Apparel, Hats, Accessories, Drinkware" }
              - { label: "Badge", name: "badge", widget: "string", required: false, hint: "e.g. Bestseller, New, Limited" }
              - { label: "Icon (emoji)", name: "icon", widget: "string", required: false }
              - { label: "Buy link URL", name: "buy_url", widget: "string", required: false, hint: "Where the Buy button sends shoppers" }
              - { label: "Description", name: "desc", widget: "text", required: false }
